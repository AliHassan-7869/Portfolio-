<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="gradT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glowT" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bgT)"/>
  <circle cx="600" cy="330" r="340" fill="url(#glowT)"/>

  <!-- faint world map dots (original, abstract) -->
  <g fill="url(#gradT)" fill-opacity="0.18">
    <circle cx="150" cy="180" r="3"/><circle cx="190" cy="200" r="3"/><circle cx="230" cy="170" r="3"/>
    <circle cx="980" cy="160" r="3"/><circle cx="1020" cy="190" r="3"/><circle cx="1050" cy="150" r="3"/>
    <circle cx="300" cy="600" r="3"/><circle cx="340" cy="620" r="3"/>
    <circle cx="900" cy="600" r="3"/><circle cx="940" cy="580" r="3"/>
    <circle cx="600" cy="120" r="3"/><circle cx="640" cy="100" r="3"/>
  </g>

  <!-- speech bubbles with greetings in different languages -->
  <g font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">
    <g transform="translate(260,190)">
      <rect x="-75" y="-38" width="150" height="76" rx="24" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <path d="M -10 38 L -25 62 L 8 40 Z" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <text x="0" y="10" font-size="26" fill="url(#gradT)">Hello</text>
    </g>
    <g transform="translate(940,190)">
      <rect x="-75" y="-38" width="150" height="76" rx="24" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <path d="M 10 38 L 25 62 L -8 40 Z" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <text x="0" y="10" font-size="26" fill="url(#gradT)">Hola</text>
    </g>
    <g transform="translate(180,420)">
      <rect x="-75" y="-38" width="150" height="76" rx="24" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <path d="M -10 38 L -25 62 L 8 40 Z" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <text x="0" y="10" font-size="26" fill="url(#gradT)">Ciao</text>
    </g>
    <g transform="translate(1020,420)">
      <rect x="-75" y="-38" width="150" height="76" rx="24" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <path d="M 10 38 L 25 62 L -8 40 Z" fill="#0a0a14" stroke="url(#gradT)" stroke-width="2.5"/>
      <text x="0" y="10" font-size="26" fill="url(#gradT)">Salut</text>
    </g>
  </g>

  <!-- translate icon top center -->
  <g transform="translate(600,120)">
    <circle r="42" fill="#0a0a14" stroke="url(#gradT)" stroke-width="3"/>
    <text x="0" y="14" font-size="34" fill="url(#gradT)" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">文A</text>
  </g>

  <!-- person silhouette at laptop -->
  <g transform="translate(600,560)">
    <!-- desk -->
    <rect x="-260" y="70" width="520" height="14" rx="4" fill="url(#gradT)" fill-opacity="0.5"/>
    <!-- laptop -->
    <rect x="-90" y="-10" width="180" height="110" rx="8" fill="#0a0a14" stroke="url(#gradT)" stroke-width="3"/>
    <rect x="-90" y="60" width="180" height="12" rx="4" fill="url(#gradT)" fill-opacity="0.6"/>
    <rect x="-70" y="8" width="140" height="44" rx="4" fill="url(#gradT)" fill-opacity="0.15" stroke="url(#gradT)" stroke-width="1.5"/>
    <!-- person body -->
    <path d="M -110 70 Q -110 -40 0 -40 Q 110 -40 110 70 Z" fill="#0a0a14" stroke="url(#gradT)" stroke-width="3"/>
    <!-- head -->
    <circle cx="0" cy="-95" r="42" fill="#0a0a14" stroke="url(#gradT)" stroke-width="3"/>
  </g>

  <!-- floating language flags/dots decoration -->
  <g fill="url(#gradT)" fill-opacity="0.6">
    <circle cx="400" cy="580" r="5"/>
    <circle cx="800" cy="580" r="5"/>
    <circle cx="430" cy="620" r="4"/>
    <circle cx="770" cy="620" r="4"/>
  </g>
</svg>
